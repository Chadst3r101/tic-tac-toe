  /* --- Design tokens (CSS custom properties) ------------------------
     A "custom property" (written --name) is a CSS variable: define it
     once, then reuse it anywhere with var(--name) instead of repeating
     the raw value. This block defines the page's whole color palette
     as named tokens (--bg, --ink, --x-color, ...) inside :root, which
     means "the <html> element" — the top of the document, so every
     element below can see these variables.

     The theme concept here is "chalkboard vs. whiteboard": dark mode
     looks like chalk on a chalkboard, light mode looks like marker on
     a dry-erase whiteboard. Only the color values differ between the
     two — every element that uses var(--ink), var(--x-color), etc.
     automatically adapts, without needing separate light/dark CSS
     rules for each component further down this file.
  ------------------------------------------------------------------- */
  :root {
    color-scheme: light dark;
    --bg: #eef0ec;
    --bg-2: #e4e7e0;
    --surface: #ffffff;
    --grid-line: #2c3234;
    --ink: #20262a;
    --muted: #6b7370;
    --muted-2: #9aa19c;
    --x-color: #cf4520;
    --x-color-soft: #cf452022;
    --o-color: #1f6fa8;
    --o-color-soft: #1f6fa822;
    --shadow: rgba(30, 38, 32, 0.14);
    --board-shadow: rgba(30, 38, 32, 0.22);
    --chip-border: #d7dbd2;
  }
  /* If the visitor's OS/browser is set to dark mode, override the
     tokens above with dark (chalkboard) values. This is the fallback
     used when the page doesn't know any better — it reacts to system
     preference automatically. */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #182620;
      --bg-2: #14201a;
      --surface: #24352d;
      --grid-line: #d3dccd;
      --ink: #eef1ea;
      --muted: #93a89b;
      --muted-2: #6d8276;
      --x-color: #ef8c68;
      --x-color-soft: #ef8c6822;
      --o-color: #7dd0ca;
      --o-color-soft: #7dd0ca22;
      --shadow: rgba(0, 0, 0, 0.35);
      --board-shadow: rgba(0, 0, 0, 0.5);
      --chip-border: #34473d;
    }
  }
  /* These two blocks do the same overrides again, but keyed off a
     data-theme="dark"/"light" attribute instead of the OS setting.
     That attribute isn't set anywhere in this file — it's a hook for
     an explicit in-page theme toggle (e.g. a switch built by whatever
     is hosting this page) to force a theme regardless of the system
     preference. Because these rules come after the @media block above,
     they win over it whenever data-theme is present. */
  :root[data-theme="dark"] {
    --bg: #182620;
    --bg-2: #14201a;
    --surface: #24352d;
    --grid-line: #d3dccd;
    --ink: #eef1ea;
    --muted: #93a89b;
    --muted-2: #6d8276;
    --x-color: #ef8c68;
    --x-color-soft: #ef8c6822;
    --o-color: #7dd0ca;
    --o-color-soft: #7dd0ca22;
    --shadow: rgba(0, 0, 0, 0.35);
    --board-shadow: rgba(0, 0, 0, 0.5);
    --chip-border: #34473d;
  }
  :root[data-theme="light"] {
    --bg: #eef0ec;
    --bg-2: #e4e7e0;
    --surface: #ffffff;
    --grid-line: #2c3234;
    --ink: #20262a;
    --muted: #6b7370;
    --muted-2: #9aa19c;
    --x-color: #cf4520;
    --x-color-soft: #cf452022;
    --o-color: #1f6fa8;
    --o-color-soft: #1f6fa822;
    --shadow: rgba(30, 38, 32, 0.14);
    --board-shadow: rgba(30, 38, 32, 0.22);
    --chip-border: #d7dbd2;
  }

  /* --- Reset & page background ---------------------------------------
     box-sizing: border-box makes padding/border count *inside* an
     element's declared width, instead of adding to it — a near-universal
     reset that makes sizing behave predictably. The body is then
     centered (a flex container centering its one child, .stage) and
     given a soft two-blob radial-gradient backdrop layered over the
     flat --bg color, using the design tokens defined above.
  --------------------------------------------------------------------- */
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 900px 500px at 18% -10%, var(--bg-2), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 110%, var(--bg-2), transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: 'Work Sans', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 2.2rem 1.25rem;
    overflow-x: hidden;
  }

  /* --- Layout: HTML section styles ------------------------------------
     From here down, each CSS rule targets one part of the page's HTML
     (further down this file, after the style block ends). Read alongside
     the HTML to see which class each rule is styling.
  --------------------------------------------------------------------- */

  /* .stage is the outer wrapper that centers the page content and caps
     its width so it doesn't stretch too wide on large screens. */
  .stage {
    width: 100%;
    max-width: 30rem;
    display: flex;
    justify-content: center;
  }

  /* This page has two "screens": the landing menu and the game board.
     Both live inside .stage as sibling elements (class="view"), but
     only one is shown at a time — JavaScript adds/removes the "active"
     class to switch between them (see showMenu()/showGame() in the
     JS section near the bottom of this file). This is a simple
     hand-rolled version of what frameworks call "client-side routing"
     or "view switching": no page reload, no server request, just CSS
     visibility toggled by JS. */
  .view {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }
  .view.active { display: flex; }

  .menu-view { padding-top: 2.2rem; }

  /* The big "Tic Tac Toe" button on the landing screen. It's built from
     two layered pieces inside one <button>: an absolutely-positioned
     SVG ring (a hand-wobbled oval, drawn stroke-by-stroke on page load —
     see animateDraw() in the JS) sitting behind a text label. Hovering
     or keyboard-focusing the button shifts the ring's color and lifts
     the label slightly; that color/motion change *is* the button's
     focus indicator, standing in for a plain outline. */
  .play-btn {
    position: relative;
    appearance: none;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 1.7rem 2.5rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn-ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .play-btn-ring path {
    fill: none;
    stroke: var(--x-color);
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke 0.2s ease;
  }
  .play-btn:hover .play-btn-ring path,
  .play-btn:focus-visible .play-btn-ring path {
    stroke: var(--o-color);
  }
  .play-btn-label {
    position: relative;
    display: flex;
    gap: 0.5rem;
    font-family: 'Permanent Marker', cursive;
    font-weight: 400;
    font-size: clamp(1.9rem, 5.4vw + 0.6rem, 2.7rem);
    line-height: 1;
    transition: transform 0.18s ease;
  }
  .play-btn:hover .play-btn-label,
  .play-btn:focus-visible .play-btn-label {
    transform: translateY(-2px);
  }
  .play-btn-label span { display: inline-block; }
  .play-btn-label .w1 { color: var(--ink); transform: rotate(-3deg) translateY(2px); }
  .play-btn-label .w2 { color: var(--x-color); transform: rotate(2deg) translateY(-3px); }
  .play-btn-label .w3 { color: var(--o-color); transform: rotate(-1.5deg) translateY(1px); }

  /* Small caption under the play button. */
  .menu-hint {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    color: var(--muted);
    text-align: center;
  }

  /* Holds the "‹ Menu" back-link at the top of the game screen. */
  .game-topbar {
    width: 100%;
    display: flex;
    justify-content: flex-start;
  }

  /* Wrapper for the in-game title + tagline, stacked and centered. */
  .masthead {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  /* The "tic tac toe" heading. Each of its three words is a separate
     <span> (classes w1/w2/w3) so they can be colored and rotated
     individually below — that's what gives the title its handwritten,
     "scrawled quickly" look instead of sitting in a straight line. */
  .title {
    margin: 0;
    display: flex;
    gap: 0.55rem;
    font-family: 'Permanent Marker', cursive;
    font-weight: 400;
    font-size: clamp(2.1rem, 5.6vw + 0.9rem, 3.4rem);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .title span { display: inline-block; }
  .title .w1 { color: var(--ink); transform: rotate(-3deg) translateY(2px); }
  .title .w2 { color: var(--x-color); transform: rotate(2deg) translateY(-3px); }
  .title .w3 { color: var(--o-color); transform: rotate(-1.5deg) translateY(1px); }

  /* Small uppercase tagline text, reused on both the menu and game screens. */
  .eyebrow {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* The "Two players" / "Vs. computer" pill switch. Styled as a single
     rounded track with two buttons inside; whichever button currently
     has aria-pressed="true" (set by JS) gets the solid dark fill. */
  .mode-toggle {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--chip-border);
    border-radius: 999px;
    padding: 0.25rem;
    box-shadow: 0 1px 2px var(--shadow);
    gap: 0.15rem;
  }
  .mode-toggle button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.84rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .mode-toggle button[aria-pressed="true"] {
    background: var(--ink);
    color: var(--surface);
  }
  .mode-toggle button:not([aria-pressed="true"]):hover {
    color: var(--ink);
  }
  /* Accessibility: a visible outline whenever any of these interactive
     elements is reached by keyboard (Tab key), not by mouse click.
     :focus-visible is what makes that mouse/keyboard distinction —
     without it, clicking a button would show the same outline as
     tabbing to it, which most users find distracting. */
  .mode-toggle button:focus-visible,
  .cell:focus-visible,
  .btn:focus-visible,
  .link-btn:focus-visible {
    outline: 2px dashed var(--x-color);
    outline-offset: 3px;
  }

  /* Row showing whose turn it is: a colored dot + a text message. */
  .status-row {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    min-height: 1.8rem;
    font-weight: 600;
    font-size: 1rem;
  }
  .status-row .dot {
    width: 0.6rem;
    height: 0.6rem;
    border-radius: 50%;
    /* --current-color is set inline by JS (updateStatus()) to whichever
       player's color is relevant right now; var(--muted) is the fallback
       used before any turn has been taken. */
    background: var(--current-color, var(--muted));
    transition: background 0.2s ease;
    flex: none;
  }
  #statusText { transition: opacity 0.15s ease; }
  #statusText.win-x { color: var(--x-color); }
  #statusText.win-o { color: var(--o-color); }

  /* --- The game board ------------------------------------------------
     The board is built from three stacked layers inside .board-wrap
     (position: relative, so children can be positioned absolute/inset:0
     on top of one another):
       1. .board-panel — the plain background card.
       2. .board-svg   — an <svg> drawing the grid lines, the X/O marks,
                          and the win-line, all as hand-wobbled paths.
       3. .cells       — 9 invisible, clickable <button> elements laid
                          out in a 3x3 CSS grid on top, so the actual
                          click targets are real, accessible HTML buttons
                          even though what the player *sees* is SVG art.
  --------------------------------------------------------------------- */
  .board-wrap {
    position: relative;
    width: min(84vw, 22rem);
    aspect-ratio: 1 / 1;
    transform: rotate(-0.35deg);
    filter: drop-shadow(0 14px 26px var(--board-shadow));
  }
  .board-panel {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border-radius: 0.9rem;
    border: 1px solid var(--chip-border);
  }
  .board-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  /* The 4 grid lines. Their shapes (slightly wobbly, not perfectly
     straight) are hardcoded SVG paths defined in the JS — this rule
     only sets how they're painted (color, thickness, rounded ends). */
  .grid-line {
    fill: none;
    stroke: var(--grid-line);
    stroke-width: 4.5;
    stroke-linecap: round;
    opacity: 0.85;
  }
  /* Styling for every X and O drawn onto the board. The JS adds one
     <path> (or two, for an X's two strokes) per move, tagged with
     class="mark x" or class="mark o" — the modifier classes below
     pick the right color for each. */
  .mark {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 9;
  }
  .mark.x { stroke: var(--x-color); }
  .mark.o { stroke: var(--o-color); }
  /* The strike-through line drawn across the three winning cells once
     a round is won (added by JS, not present in the initial markup). */
  .win-line {
    fill: none;
    stroke-linecap: round;
    stroke-width: 6;
    opacity: 0.9;
  }

  /* The invisible 3x3 grid of real, clickable buttons that sits on top
     of the SVG board (see the "three stacked layers" note above). */
  .cells {
    position: absolute;
    inset: 4%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
  }
  .cell {
    appearance: none;
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
    border-radius: 0.5rem;
    transition: background 0.15s ease;
  }
  .cell:hover:not(:disabled) { background: rgba(127, 127, 127, 0.08); }
  .cell:disabled { cursor: default; }

  /* The X / O / Draws tally row under the board. */
  .scoreboard {
    display: flex;
    gap: 0.6rem;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
  }
  .chip {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    background: var(--surface);
    border: 1px solid var(--chip-border);
    border-radius: 0.6rem;
    padding: 0.45rem 0.75rem;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .chip .label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .chip .value {
    font-size: 1.15rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .chip.x .value { color: var(--x-color); }
  .chip.o .value { color: var(--o-color); }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.1rem;
    min-height: 2.6rem;
  }
  /* The solid "Next round" button. It's invisible and unclickable by
     default (opacity: 0, pointer-events: none) and only appears once
     JS adds the "visible" class after a round ends — see endRound()
     in the script. That keeps it out of the way (and out of the tab
     order) while a round is still being played. */
  .btn {
    appearance: none;
    border: none;
    border-radius: 0.6rem;
    padding: 0.7rem 1.3rem;
    font-family: 'Work Sans', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.01em;
    background: var(--ink);
    color: var(--surface);
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.2s ease;
    opacity: 0;
    transform: translateY(4px) scale(0.98);
    pointer-events: none;
  }
  .btn.visible {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  /* Plain-text button style used for "Reset match" and "‹ Menu" — a
     hand-drawn underline (the ::after pseudo-element below) sweeps in
     from the left on hover/focus instead of a boring color change. */
  .link-btn {
    appearance: none;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    padding: 0.2rem 0;
    position: relative;
  }
  .link-btn::after {
    content: "";
    position: absolute;
    left: 0; right: 100%;
    bottom: -2px;
    height: 2px;
    background: var(--x-color);
    transition: right 0.2s ease;
  }
  .link-btn:hover::after,
  .link-btn:focus-visible::after { right: 0; }
  .link-btn:hover { color: var(--ink); }

  footer {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    color: var(--muted-2);
    text-align: center;
  }

  /* Accessibility: some people set "reduce motion" in their OS because
     animation causes them discomfort (e.g. vestibular disorders). This
     media query detects that setting and forces every CSS transition/
     animation on the page to be (near-)instant. The JS respects the
     same preference separately for its own animations — see the
     reduceMotion variable near the top of the script block. */
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.001ms !important; animation-duration: 0.001ms !important; }
  }
</style>

<!-- ============================== HTML ==============================
     Everything below is HTML: the actual content and structure of the
     page (the CSS above only styles it; the JS below only makes it
     interactive). Elements with an id="..." attribute are the ones the
     JavaScript looks up by name and controls directly — search for
     that same id inside the script block to see what it does.
====================================================================== -->
<div class="stage">
  <!-- Landing screen: shown first (has "active"). Clicking #playBtn switches to #gameView. -->
  <div class="view menu-view active" id="menuView">
    <p class="eyebrow">chalkboard rules, marker optional</p>
    <!-- The clickable "Tic-Tac-Toe" button: hand-drawn ring + lettered label, same
         style as the in-game title so it reads as one brand mark. -->
    <button type="button" class="play-btn" id="playBtn" aria-label="Play Tic Tac Toe">
      <svg class="play-btn-ring" viewBox="0 0 340 150" aria-hidden="true">
        <path id="ringPath" d="M 32 92 C 18 42, 78 12, 170 13 C 268 14, 324 44, 309 86 C 297 126, 228 141, 170 139 C 88 137, 22 130, 32 92 Z" />
      </svg>
      <span class="play-btn-label">
        <span class="w1">Tic</span><span class="w2">Tac</span><span class="w3">Toe</span>
      </span>
    </button>
    <p class="menu-hint">tap to start &middot; two players or vs. computer</p>
    <footer>played locally in this tab &middot; nothing is saved or sent anywhere</footer>
  </div>

  <!-- Game screen: hidden until #playBtn is clicked (no "active" class). -->
  <div class="view game-view" id="gameView">
    <!-- Returns to the menu without resetting the current round. -->
    <div class="game-topbar">
      <button type="button" class="link-btn" id="backBtn">&lsaquo; Menu</button>
    </div>

    <div class="masthead">
      <h1 class="title" aria-label="Tic Tac Toe">
        <span class="w1">tic</span><span class="w2">tac</span><span class="w3">toe</span>
      </h1>
      <p class="eyebrow">chalkboard rules, marker optional</p>
    </div>

    <!-- aria-pressed tells screen readers which mode button is active;
         JS keeps it in sync with the actual game mode (see setMode()). -->
    <div class="mode-toggle" role="group" aria-label="Game mode">
      <button type="button" id="modeFriend" aria-pressed="true">Two players</button>
      <button type="button" id="modeCPU" aria-pressed="false">Vs. computer</button>
    </div>

    <!-- "X's turn to draw" / "O wins this round" / etc. Updated by JS
         (updateStatus() and endRound()) as the game progresses. -->
    <div class="status-row">
      <span class="dot" id="turnDot"></span>
      <span id="statusText">X draws first</span>
    </div>

    <!-- The board itself: an empty <svg> here — every grid line, X, O,
         and win-line you see is added into these three <g> (group)
         elements by JavaScript while the page runs. Nothing is
         hand-drawn in this HTML; open the script block and search for
         "gridLines", "marksEl", and "winLineGroupEl" to see where. -->
    <div class="board-wrap">
      <div class="board-panel"></div>
      <svg class="board-svg" viewBox="0 0 300 300" aria-hidden="true">
        <g id="gridLines"></g>
        <g id="marks"></g>
        <g id="winLineGroup"></g>
      </svg>
      <!-- Also empty here — JS fills this with 9 <button> elements,
           one per cell, the first time the game screen is opened
           (see buildStaticBoard()). -->
      <div class="cells" id="cells" role="group" aria-label="Board"></div>
    </div>

    <div class="scoreboard" aria-live="off">
      <div class="chip x">
        <span class="label">X</span>
        <span class="value" id="scoreX">0</span>
      </div>
      <div class="chip o">
        <span class="label">O</span>
        <span class="value" id="scoreO">0</span>
      </div>
      <div class="chip">
        <span class="label">DRAWS</span>
        <span class="value" id="scoreD">0</span>
      </div>
    </div>

    <!-- "Next round" starts hidden (see .btn's CSS) and only becomes
         visible once a round ends. "Reset match" is always available
         and zeroes the scoreboard. -->
    <div class="controls">
      <button type="button" class="btn" id="nextRoundBtn">Next round</button>
      <button type="button" class="link-btn" id="resetBtn">Reset match</button>
    </div>
  </div>
</div>

<script>
// ============================== JAVASCRIPT ==============================
// Everything below is JavaScript — it runs in the browser after the HTML
// and CSS above have loaded, and it's what actually makes the page a
// *game* rather than a static picture: reading clicks, keeping track of
// whose turn it is, drawing the marks, and deciding who won.
//
// The whole script is wrapped in (function () { ... })() — an
// "Immediately Invoked Function Expression" (IIFE). Wrapping code this
// way runs it right away while keeping every variable and function
// declared inside private to this block, so it can't accidentally clash
// with anything else that might run on the same page. "use strict" below
// turns on JavaScript's stricter error-checking mode (e.g. it stops you
// from using a variable you forgot to declare with var/let/const).
// ==========================================================================
(function () {
  "use strict";

  // True if the visitor's OS is set to "reduce motion" (see the matching
  // CSS media query above). Checked before running any hand-drawn-style
  // animation so those visitors get instant results instead.
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- Board geometry & artwork -------------------------------------
  // The board is drawn in a 300x300 unit coordinate space (matching the
  // SVG's viewBox="0 0 300 300" in the HTML). These constants describe
  // where things go and what they look like within that space.

  // Pixel-space (x, y) center point of each of the 9 cells, numbered
  // left-to-right, top-to-bottom (0 = top-left, 8 = bottom-right).
  var CELL_CENTERS = [
    [50, 50], [150, 50], [250, 50],
    [50, 150], [150, 150], [250, 150],
    [50, 250], [150, 250], [250, 250]
  ];

  // SVG path data ("d" attribute syntax) for the 2 vertical + 2 horizontal
  // grid lines. Each is a curve (C/S commands) with small deliberate
  // deviations rather than a straight line, so it reads as hand-drawn
  // instead of ruler-straight. If you've never seen SVG path syntax
  // before: M = move to a start point, C/S = draw a curve to a point.
  var GRID_PATHS = [
    "M 101 8 C 98 55, 105 95, 100 130 S 103 220, 98 292",
    "M 200 10 C 197 60, 203 110, 198 150 S 202 235, 197 290",
    "M 8 100 C 55 97, 115 104, 150 99 S 235 103, 292 97",
    "M 10 199 C 65 202, 130 195, 150 200 S 230 196, 290 202"
  ];

  // Path data for one X mark (its two diagonal strokes) and one O mark,
  // each drawn within a local 80x80 box. drawMark() below positions a
  // copy of these at whichever cell was clicked.
  var X_PATH_A = "M 12 12 C 22 24, 35 34, 40 40 S 60 58, 70 70";
  var X_PATH_B = "M 70 11 C 58 22, 46 33, 40 40 S 22 58, 11 69";
  var O_PATH = "M 41 6 C 62 5, 75 20, 75 40 C 76 61, 61 76, 40 75 C 20 75, 6 60, 6 40 C 5 20, 20 6, 41 6 Z";

  // All 8 ways to win: 3 rows, 3 columns, 2 diagonals. Each inner array
  // holds 3 cell indices (matching the numbering used by CELL_CENTERS);
  // if a player occupies all 3, they've won that line.
  var WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // The XML namespace SVG elements must be created with. Regular HTML
  // elements are made with document.createElement('div'); SVG elements
  // need the more specific document.createElementNS(svgNS, 'path') —
  // used throughout this file wherever a grid line, mark, or win-line
  // is drawn.
  var svgNS = "http://www.w3.org/2000/svg";

  // --- Game state ------------------------------------------------------
  // board: an array of 9 entries, one per cell — each is null (empty),
  //        'X', or 'O'.
  // current: whose turn it is right now, 'X' or 'O'.
  // gameOver: true once the current round has been won or drawn.
  // mode: 'friend' (local two-player) or 'cpu' (vs. the computer).
  // cpuThinking: true while the computer's move is "pending" (see the
  //              setTimeout in placeMark()), used to ignore clicks
  //              during that pause.
  var board, current, gameOver, mode, cpuThinking;
  var scores = { X: 0, O: 0, D: 0 };

  // --- Cached element references ----------------------------------------
  // Every interactive or dynamically-updated element in the HTML is
  // looked up once here (by its id) and kept in a variable, rather than
  // re-querying the document every time it's needed.

  // Menu/game screen elements + a flag so the board is only built once,
  // the first time the player clicks into the game.
  var menuView = document.getElementById('menuView');
  var gameView = document.getElementById('gameView');
  var playBtn = document.getElementById('playBtn');
  var backBtn = document.getElementById('backBtn');
  var ringPath = document.getElementById('ringPath');
  var gameInitialized = false;

  var gridLinesEl = document.getElementById('gridLines');
  var marksEl = document.getElementById('marks');
  var winLineGroupEl = document.getElementById('winLineGroup');
  var cellsEl = document.getElementById('cells');
  var statusText = document.getElementById('statusText');
  var turnDot = document.getElementById('turnDot');
  var nextRoundBtn = document.getElementById('nextRoundBtn');
  var resetBtn = document.getElementById('resetBtn');
  var modeFriendBtn = document.getElementById('modeFriend');
  var modeCPUBtn = document.getElementById('modeCPU');
  var scoreXEl = document.getElementById('scoreX');
  var scoreOEl = document.getElementById('scoreO');
  var scoreDEl = document.getElementById('scoreD');

  var cellButtons = [];

  // Draws an SVG path in stroke-by-stroke, like it's being handwritten.
  // Shared by the grid lines, X/O marks, the win line, and the menu ring
  // (previously each of those duplicated this dasharray/dashoffset trick).
  function animateDraw(p, duration) {
    if (reduceMotion) return;
    var len = p.getTotalLength();
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
    p.style.transition = 'stroke-dashoffset ' + duration + 's ease';
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { p.style.strokeDashoffset = 0; });
    });
  }

  // Back to the landing screen. Board/score state is left untouched,
  // so returning to the game later resumes exactly where it left off.
  function showMenu() {
    gameView.classList.remove('active');
    menuView.classList.add('active');
  }

  // Enter the game screen. The board/cells/listeners are only ever
  // built once (guarded by gameInitialized), not on every visit.
  function showGame() {
    menuView.classList.remove('active');
    gameView.classList.add('active');
    if (!gameInitialized) {
      gameInitialized = true;
      buildStaticBoard();
      mode = 'friend';
      resetRound();
    }
  }

  // One-time setup for the game screen: draws the 4 grid lines into the
  // SVG and creates the 9 clickable cell <button>s (see the .cells CSS
  // rule for why real buttons sit on top of the SVG art). Called once,
  // from showGame(), the first time the player enters the game.
  function buildStaticBoard() {
    GRID_PATHS.forEach(function (d) {
      var p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('class', 'grid-line');
      gridLinesEl.appendChild(p);
      animateDraw(p, 0.6);
    });

    for (var i = 0; i < 9; i++) {
      var btn = document.createElement('button');
      btn.className = 'cell';
      btn.type = 'button';
      btn.dataset.idx = i; // remembers which of the 9 cells this button is
      btn.setAttribute('aria-label', 'Cell ' + (Math.floor(i / 3) + 1) + ', ' + (i % 3 + 1) + ', empty');
      btn.addEventListener('click', onCellClick);
      cellsEl.appendChild(btn);
      cellButtons.push(btn);
    }
  }

  // Starts a fresh round: empties the board array, clears any drawn
  // marks/win-line from the SVG, re-enables all 9 cell buttons, and
  // resets the status text. Scores are NOT touched here — see
  // resetMatch() for that. Called on page load (via showGame()) and
  // whenever "Next round" is clicked.
  function resetRound() {
    board = new Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cpuThinking = false;
    marksEl.innerHTML = '';
    winLineGroupEl.innerHTML = '';
    cellButtons.forEach(function (btn, i) {
      btn.disabled = false;
      btn.setAttribute('aria-label', 'Cell ' + (Math.floor(i / 3) + 1) + ', ' + (i % 3 + 1) + ', empty');
    });
    nextRoundBtn.classList.remove('visible');
    statusText.className = '';
    updateStatus();
  }

  // Zeroes the X/O/Draws scoreboard, then starts a new round on top of
  // that. Called when "Reset match" is clicked or the mode is switched.
  function resetMatch() {
    scores = { X: 0, O: 0, D: 0 };
    updateScoreboard();
    resetRound();
  }

  // Copies the in-memory `scores` object onto the screen. Called any
  // time a score changes (after a win/draw) or is reset.
  function updateScoreboard() {
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDEl.textContent = scores.D;
  }

  // Refreshes the "whose turn" text and the colored dot next to it,
  // based on the current `mode` and `current` player. Does nothing once
  // the round is over (endRound() sets its own final message instead).
  function updateStatus() {
    if (gameOver) return;
    if (mode === 'cpu' && current === 'O') {
      statusText.textContent = 'Computer is thinking…';
    } else if (mode === 'cpu' && current === 'X') {
      statusText.textContent = 'Your turn — draw an X';
    } else {
      statusText.textContent = current + "'s turn to draw";
    }
    // Sets a CSS custom property directly on the dot element — read by
    // the ".status-row .dot" rule's `var(--current-color, ...)` in the
    // style block above.
    turnDot.style.setProperty('--current-color', current === 'X' ? 'var(--x-color)' : 'var(--o-color)');
  }

  // Draws one X or O into cell `idx`. Wraps the mark's path(s) in a
  // <g> (group) element, positioned with an SVG transform so the local
  // 0-80 coordinates of X_PATH_A/B/O_PATH land centered on that cell —
  // see CELL_CENTERS for where "centered" means for each of the 9 cells.
  function drawMark(idx, player) {
    var center = CELL_CENTERS[idx];
    var g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', 'translate(' + (center[0] - 40) + ',' + (center[1] - 40) + ')');

    var paths = player === 'X' ? [X_PATH_A, X_PATH_B] : [O_PATH];
    paths.forEach(function (d) {
      var p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('class', 'mark ' + player.toLowerCase());
      g.appendChild(p);
      animateDraw(p, 0.32);
    });
    marksEl.appendChild(g);
  }

  // Draws the strike-through line across the three winning cells once a
  // round is won. `line` is one of the triples from WIN_LINES (e.g.
  // [0,1,2] for the top row); this connects the first and last cell's
  // centers with a slightly curved line (a Q = quadratic curve, bowed
  // a few pixels off-straight to match the rest of the hand-drawn look).
  function drawWinLine(line, player) {
    var a = CELL_CENTERS[line[0]];
    var c = CELL_CENTERS[line[2]];
    var mx = (a[0] + c[0]) / 2, my = (a[1] + c[1]) / 2;
    var d = 'M ' + a[0] + ' ' + a[1] + ' Q ' + (mx + 4) + ' ' + (my - 5) + ', ' + c[0] + ' ' + c[1];
    var p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('class', 'win-line');
    p.style.stroke = player === 'X' ? 'var(--x-color)' : 'var(--o-color)';
    winLineGroupEl.appendChild(p);
    animateDraw(p, 0.4);
  }

  // Looks at a board array (`b`, 9 entries of 'X'/'O'/null) and reports
  // whether the game is decided:
  //   - a completed WIN_LINES triple  → { winner: 'X'|'O', line: [...] }
  //   - board full with no winner     → { winner: null, line: null, draw: true }
  //   - otherwise (game continues)    → null
  // This is a pure function (no side effects, same input always gives
  // the same output), which is exactly why it can be reused both for
  // the *real* board during play and for hypothetical boards inside
  // the computer's minimax() search below.
  function checkResult(b) {
    for (var i = 0; i < WIN_LINES.length; i++) {
      var line = WIN_LINES[i];
      var a = b[line[0]], b2 = b[line[1]], c = b[line[2]];
      if (a && a === b2 && a === c) return { winner: a, line: line };
    }
    if (b.every(function (v) { return v; })) return { winner: null, line: null, draw: true };
    return null;
  }

  // Wraps up a finished round: locks the board, records the result on
  // the scoreboard, shows the final status message, draws the win-line
  // if there was one, and reveals the "Next round" button. Called from
  // placeMark() the instant checkResult() reports the game is decided.
  function endRound(result) {
    gameOver = true;
    cellButtons.forEach(function (btn) { btn.disabled = true; });
    if (result.draw) {
      scores.D++;
      statusText.textContent = "It's a draw — board's full";
      statusText.className = '';
    } else {
      scores[result.winner]++;
      drawWinLine(result.line, result.winner);
      var label = (mode === 'cpu' && result.winner === 'O') ? 'Computer wins this round' : result.winner + ' wins this round';
      statusText.textContent = label;
      statusText.className = result.winner === 'X' ? 'win-x' : 'win-o';
    }
    updateScoreboard();
    nextRoundBtn.classList.add('visible');
  }

  // The single function that actually plays a move for either a human
  // or the computer: records it in the `board` array, draws it, checks
  // whether that move just won or drew the game, and — if not — hands
  // the turn to the other player. When it becomes the computer's turn
  // in "vs. computer" mode, this also schedules the computer's reply.
  function placeMark(idx, player) {
    board[idx] = player;
    drawMark(idx, player);
    var btn = cellButtons[idx];
    btn.disabled = true;
    btn.setAttribute('aria-label', 'Cell ' + (Math.floor(idx / 3) + 1) + ', ' + (idx % 3 + 1) + ', ' + player);

    var result = checkResult(board);
    if (result) {
      endRound(result);
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    updateStatus();

    if (!gameOver && mode === 'cpu' && current === 'O') {
      // Disable the board and wait ~half a second before the computer
      // "plays" — purely cosmetic (so its move doesn't appear instantly),
      // it has no effect on what move gets picked.
      cpuThinking = true;
      cellButtons.forEach(function (b) { if (!b.disabled) b.disabled = true; });
      setTimeout(function () {
        cpuThinking = false;
        var move = bestMove(board);
        if (move !== -1) placeMark(move, 'O');
        // Re-enable whatever cells are still empty for the human's turn
        // (placeMark's own btn.disabled = true above only handled the
        // cell the computer just played).
        if (!gameOver) {
          cellButtons.forEach(function (b, i) { if (!board[i]) b.disabled = false; });
        }
      }, 480);
    }
  }

  // Handles a real click on one of the 9 board buttons. Ignored while
  // the round is already over, while a cell is already filled, while
  // the computer is "thinking", or (in vs.-computer mode) when it isn't
  // the human's turn.
  function onCellClick(e) {
    if (gameOver || cpuThinking) return;
    var idx = parseInt(e.currentTarget.dataset.idx, 10);
    if (board[idx]) return;
    if (mode === 'cpu' && current !== 'X') return;
    placeMark(idx, current);
  }

  // --- The computer opponent: minimax search ----------------------------
  // Minimax is the standard algorithm for "perfect play" in small
  // two-player games like this one. The idea: imagine every possible
  // way the rest of the game could unfold from a given board, assuming
  // both sides always make their best possible move. Recursively score
  // each hypothetical final position (+10 for an O win, -10 for an X
  // win, 0 for a draw — favoring quicker wins/slower losses via the
  // `depth` adjustment), then work backwards:
  //   - O is "maximizing": on O's hypothetical turns, it picks whichever
  //     next move leads to the highest score reachable from there.
  //   - X is "minimizing": on X's hypothetical turns, it picks whichever
  //     move leads to the lowest score — i.e. this function assumes the
  //     human plays their best move too, not a careless one.
  // Because tic-tac-toe has so few possible games (at most 9! = 362,880,
  // and far fewer in practice), this brute-force search finishes
  // instantly and never loses — at worst it draws.
  //
  // `b` is a board array to evaluate (NOT necessarily the real game
  // board — see bestMove() below, which tries moves on a copy... in
  // this case, it mutates the real board temporarily and restores it,
  // since minimax always undoes each move it tries via `b[i] = null`).
  // `isMax` is true on O's hypothetical turns, false on X's. `depth` is
  // how many moves deep this hypothetical line already is.
  function minimax(b, isMax, depth) {
    var result = checkResult(b);
    if (result) {
      if (result.draw) return 0;
      if (result.winner === 'O') return 10 - depth;
      return depth - 10;
    }
    var scoresArr = [];
    for (var i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';               // try this move...
        scoresArr.push(minimax(b, !isMax, depth + 1)); // ...see how it plays out...
        b[i] = null;                             // ...then undo it (backtrack).
      }
    }
    return isMax ? Math.max.apply(null, scoresArr) : Math.min.apply(null, scoresArr);
  }

  // Picks the computer's actual move: tries placing 'O' in each empty
  // cell, scores that resulting position with minimax(), and returns
  // whichever cell scored highest for O. Returns -1 only if there are
  // no empty cells (shouldn't happen in practice, since this is only
  // called when the game isn't already over).
  function bestMove(b) {
    var best = -Infinity, move = -1;
    for (var i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = 'O';
        var score = minimax(b, false, 0);
        b[i] = null;
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  // Switches between "Two players" and "Vs. computer", updates which
  // toggle button looks pressed, and starts a brand new match (this
  // also resets the scoreboard — switching modes mid-match wouldn't
  // make sense to carry a score across).
  function setMode(newMode) {
    mode = newMode;
    modeFriendBtn.setAttribute('aria-pressed', String(mode === 'friend'));
    modeCPUBtn.setAttribute('aria-pressed', String(mode === 'cpu'));
    resetMatch();
  }

  // --- Wire everything up ------------------------------------------
  // Every function above only *defines* behavior; nothing actually runs
  // until an event listener connects it to something the player does.
  // This is the bottom of the script, so by this point every function
  // and element reference used below has already been declared above.
  modeFriendBtn.addEventListener('click', function () { if (mode !== 'friend') setMode('friend'); });
  modeCPUBtn.addEventListener('click', function () { if (mode !== 'cpu') setMode('cpu'); });
  nextRoundBtn.addEventListener('click', resetRound);
  resetBtn.addEventListener('click', resetMatch);
  playBtn.addEventListener('click', showGame); // menu -> game
  backBtn.addEventListener('click', showMenu); // game -> menu

  // Draw the menu button's ring in on page load. The board itself is no
  // longer built here on load — that now happens lazily inside showGame(),
  // the first time the player actually clicks into the game.
  animateDraw(ringPath, 0.7);
})(); // end of the IIFE — everything above is now running.
</script>
